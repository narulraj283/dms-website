  </text>

  <!-- Small accent text -->
  <text x="600" y="570" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="500" fill="#D4A843" text-anchor="middle" opacity="0.9">
