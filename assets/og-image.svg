  <!-- Decorative circle elements -->
  <circle cx="100" cy="100" r="80" fill="#D4A843" opacity="0.1"/>
  <circle cx="1100" cy="550" r="120" fill="#2E75B6" opacity="0.1"/>

  <!-- Main text: "Dental Marketing Society" -->
  <text x="600" y="220" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">
    Dental Marketing
  </text>
  <text x="600" y="310" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="700" fill="#D4A843" text-anchor="middle" letter-spacing="0.5">
